services:
  mcp-rpi-system:
    build: .
    container_name: mcp-rpi-system
    restart: unless-stopped
    environment:
      MCP_LOG_LEVEL: INFO
      # Power action control is now configured in src/config/settings.py
      # via ALLOW_POWER_ACTIONS. No environment variable is needed here.
    volumes:
      - ./src:/app/src:ro
    command: ["python3", "src/server.py"]
